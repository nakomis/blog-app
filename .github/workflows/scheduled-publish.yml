name: Publish scheduled posts

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog-app
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Load blog-content deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BLOG_CONTENT_DEPLOY_KEY }}

      - name: Pull latest blog-content
        run: git submodule update --init --remote web/content

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423226886:role/blog-app-github-deploy
          aws-region: eu-west-2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Deploy
        run: bash scripts/deploy.sh
        working-directory: web
